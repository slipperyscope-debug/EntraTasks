name: Create Entra ID User

on:
  workflow_dispatch:
    inputs:
      displayName:
        description: 'Full Display Name'
        required: true
      userPrincipalName:
        description: 'UPN (e.g. user@yourdomain.com)'
        required: true
      password:
        description: 'Temporary Password'
        required: true

permissions:
  id-token: write # Required for requesting the OIDC JWT token from GitHub
  contents: read  # Required for actions/checkout

jobs:
  create-user:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
          enable-AzPSSession: true # Enables Azure PowerShell context

      - name: Execute Create User Script
        shell: pwsh
        run: |
          ./create-user.ps1 `
            -DisplayName "${{ github.event.inputs.displayName }}" `
            -UserPrincipalName "${{ github.event.inputs.userPrincipalName }}" `
            -MailNickname "${{ github.event.inputs.displayName }}" `
            -Password "${{ github.event.inputs.password }}"
